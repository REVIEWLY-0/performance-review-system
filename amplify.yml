version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # This must point to the build output relative to the REPO ROOT
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      # Cache node_modules to speed up future builds
      - frontend/node_modules/**/*