name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ECR_REPO=659788916559.dkr.ecr.eu-west-2.amazonaws.com/reviewly-backend" >> $GITHUB_ENV
            echo "ECS_CLUSTER=reviewly-backend-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=reviewly-backend-service" >> $GITHUB_ENV
          else
            echo "ECR_REPO=659788916559.dkr.ecr.eu-west-2.amazonaws.com/reviewly-backend-dev" >> $GITHUB_ENV
            echo "ECS_CLUSTER=reviewly-backend-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=reviewly-backend-dev-service" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        run: |
          docker build -t reviewly-backend ./backend
          docker tag reviewly-backend:latest ${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REPO }}:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment